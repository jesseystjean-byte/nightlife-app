name: Code check

# Fast syntax/sanity gate on every push & PR. Catches broken or truncated files
# BEFORE they reach Vercel or burn an EAS iOS build.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check API functions
        run: |
          for f in api/*.ts; do
            echo "== $f"
            npx -y esbuild --loader:.ts=ts "$f" --outfile=/dev/null
          done

      - name: Syntax-check app
        run: |
          for f in mobile/App.tsx mobile/src/*.ts mobile/src/*.tsx mobile/src/screens/*.tsx; do
            echo "== $f"
            npx -y esbuild --loader:.ts=ts --loader:.tsx=tsx "$f" --outfile=/dev/null
          done

      - name: Check app import graph resolves
        run: |
          npx -y esbuild mobile/App.tsx --bundle --outfile=/dev/null \
            --loader:.tsx=tsx --loader:.ts=ts \
            --external:react --external:react-native --external:expo-location \
            --external:expo-status-bar --external:@react-native-async-storage/async-storage

      - name: Validate JSON configs
        run: |
          node -e "JSON.parse(require('fs').readFileSync('mobile/app.json','utf8')); console.log('app.json ok')"
          node -e "JSON.parse(require('fs').readFileSync('mobile/eas.json','utf8')); console.log('eas.json ok')"
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('vercel.json ok')"

      - name: Guard against truncated files
        run: |
          for f in mobile/App.tsx mobile/src/*.ts mobile/src/*.tsx mobile/src/screens/*.tsx api/*.ts; do
            tail -c 50 "$f" | grep -qE "[};]" || (echo "$f looks truncated" && exit 1)
          done
