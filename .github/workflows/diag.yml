name: Diag EAS failure

on:
  push:
    paths:
      - '.github/workflows/diag.yml'

permissions:
  actions: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch failed run log and report
        run: |
          R="https://api.github.com/repos/${{ github.repository }}/actions"
          H="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
          curl -s -H "$H" "$R/runs/27401286626/jobs" > jobs.json
          JOBID=$(jq -r '.jobs[0].id' jobs.json)
          STEPS=$(jq -r '[.jobs[0].steps[] | "\(.conclusion // "skip") \(.name)"] | join(" | ")' jobs.json | head -c 450)
          curl -s -L -H "$H" "$R/jobs/$JOBID/logs" > log.txt || true
          ERRS=$(grep -inE "error|fail|denied|limit|quota|invalid|expired" log.txt | tail -25 | head -c 1900 || true)
          TAILTXT=$(tail -c 1900 log.txt || true)
          post() { curl -s -X POST https://project-ushrm.vercel.app/api/log -H 'content-type: application/json' --data-binary "$(jq -n --arg m "$1" --arg s "$2" '{message:$m, stack:$s, build:"diag"}')"; }
          post "DIAG steps: $STEPS" "run 27401286626 job $JOBID"
          post "DIAG error-lines" "$ERRS"
          post "DIAG log-tail" "$TAILTXT"
