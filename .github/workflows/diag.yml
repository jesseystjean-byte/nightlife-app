name: Diag EAS failure
on:
  push:
    paths:
      - '.github/workflows/diag.yml'
permissions:
  actions: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Report latest failed EAS run error
        run: |
          R="https://api.github.com/repos/${{ github.repository }}/actions"
          H="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
          RID=$(curl -s -H "$H" "$R/workflows/eas-ios.yml/runs?status=failure&per_page=1" | jq -r '.workflow_runs[0].id')
          curl -s -H "$H" "$R/runs/$RID/jobs" > jobs.json
          JOBID=$(jq -r '.jobs[0].id' jobs.json)
          DUR=$(jq -r '[.jobs[0].steps[] | "\(.conclusion // "?") \(.name)"] | join(" | ")' jobs.json)
          curl -s -L -H "$H" "$R/jobs/$JOBID/logs" > log.txt || true
          ERRS=$(grep -inE "error|fail|denied|limit|quota|invalid|expired|agreement|membership|certificate|provisioning|credential" log.txt | grep -ivE "cache service|failed to restore|failed to save|ENOSPC" | tail -22 | head -c 1900 || true)
          curl -s -X POST https://project-ushrm.vercel.app/api/log -H 'content-type: application/json' --data-binary "$(jq -n --arg m "DIAG4 run $RID STEPS: $DUR" --arg s "$ERRS" '{message:$m, stack:$s, build:"diag4"}')"
