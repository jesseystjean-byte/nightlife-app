name: Diag EAS failure
on:
  push:
    paths: ['.github/workflows/diag.yml']
permissions:
  actions: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          R="https://api.github.com/repos/${{ github.repository }}/actions"
          H="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
          RID=$(curl -s -H "$H" "$R/workflows/eas-ios.yml/runs?status=failure&per_page=1" | jq -r '.workflow_runs[0].id')
          JOBID=$(curl -s -H "$H" "$R/runs/$RID/jobs" | jq -r '.jobs[0].id')
          curl -s -L -H "$H" "$R/jobs/$JOBID/logs" > log.txt || true
          sed -r 's/\x1b\[[0-9;?]*[a-zA-Z]//g' log.txt | sed -r 's/^[0-9T:.Z-]+ //' | tail -22 > payload.txt
          jq -Rs '{message:"DIAG8", stack:., build:"diag8"}' payload.txt > body.json
          curl -s -X POST https://project-ushrm.vercel.app/api/log -H 'content-type: application/json' --data-binary @body.json
