name: Fix iOS credentials
on:
  push:
    paths:
      - '.github/workflows/fixcreds.yml'
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Diagnose + attempt credential regen
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@latest whoami > who.txt 2>&1 || true
          npm install >/dev/null 2>&1 || true
          npx eas-cli@latest build --platform ios --profile production --non-interactive --no-wait --clear-cache > build.txt 2>&1 || true
          { echo "=WHOAMI="; tail -3 who.txt; echo "=BUILD="; tail -45 build.txt; } > all.txt
          python3 - <<'PY'
import json,urllib.request
txt=open('all.txt').read()[-1900:]
data=json.dumps({"message":"FIXCREDS2","stack":txt,"build":"fixcreds2"}).encode()
req=urllib.request.Request("https://project-ushrm.vercel.app/api/log",data=data,headers={"content-type":"application/json"})
try: urllib.request.urlopen(req,timeout=20)
except Exception as e: print("post err",e)
PY
          cat all.txt | head -c 1500
