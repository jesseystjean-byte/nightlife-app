name: Fix iOS credentials
on:
  push:
    paths:
      - '.github/workflows/fixcreds.yml'
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Diagnose + attempt credential regen
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          OUT=""
          who=$(npx eas-cli@latest whoami 2>&1 | tail -3 || true)
          OUT="$OUT WHOAMI: $who ||| "
          npm install >/dev/null 2>&1 || true
          # Try a non-interactive build with cache clear — with an ASC API key present,
          # EAS regenerates a missing/invalid distribution cert automatically.
          build=$(npx eas-cli@latest build --platform ios --profile production --non-interactive --no-wait --clear-cache 2>&1 | tail -40 || true)
          OUT="$OUT BUILD: $build"
          curl -s -X POST https://project-ushrm.vercel.app/api/log -H 'content-type: application/json' --data-binary "$(python3 -c "import json,sys,os; print(json.dumps({'message':'FIXCREDS','stack':os.environ.get('O','')[:1900],'build':'fixcreds'}))" 2>/dev/null || echo '{}')" -d "$(python3 -c "import json,os;print(json.dumps({'message':'FIXCREDS','stack':'''$OUT'''[:1900],'build':'fixcreds'}))" 2>/dev/null)" || true
          echo "$OUT" | head -c 1500
